name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            asset_name: mvt-x86_64-unknown-linux-gnu.tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            asset_name: mvt-aarch64-unknown-linux-gnu.tar.gz
          - target: x86_64-apple-darwin
            os: macos-latest
            asset_name: mvt-x86_64-apple-darwin.tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            asset_name: mvt-aarch64-apple-darwin.tar.gz

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      # Cross-compilation tools for Linux aarch64.
      - name: Install cross-compilation tools (aarch64 linux)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Configure linker for aarch64 linux
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          mkdir -p .cargo
          {
            echo '[target.aarch64-unknown-linux-gnu]'
            echo 'linker = "aarch64-linux-gnu-gcc"'
          } >> .cargo/config.toml

      # CRITICAL: patch Cargo.toml version from the pushed tag so the binary
      # reports the right version. Without this, every release binary reports
      # whatever version is hardcoded in Cargo.toml.
      - name: Patch Cargo.toml version from tag
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Patching version to $VERSION"
          if [[ "$RUNNER_OS" == "macOS" ]]; then
            sed -i '' -E "s/^version = \".*\"/version = \"$VERSION\"/" Cargo.toml
          else
            sed -i -E "s/^version = \".*\"/version = \"$VERSION\"/" Cargo.toml
          fi
          grep '^version' Cargo.toml

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Strip binary
        shell: bash
        run: |
          set -euo pipefail
          BIN="target/${{ matrix.target }}/release/mvt"
          case "${{ matrix.target }}" in
            aarch64-unknown-linux-gnu)
              aarch64-linux-gnu-strip "$BIN" || true
              ;;
            *)
              strip "$BIN" || true
              ;;
          esac

      - name: Package tarball
        shell: bash
        run: |
          set -euo pipefail
          cd "target/${{ matrix.target }}/release"
          tar czf "../../../${{ matrix.asset_name }}" mvt
          cd -
          ls -la "${{ matrix.asset_name }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.asset_name }}

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: List artifacts
        run: ls -la

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: "*.tar.gz"
          generate_release_notes: true
